name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: AI Review
        uses: AleksandrFurmenkovOfficial/ai-code-review@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ai_provider: google
